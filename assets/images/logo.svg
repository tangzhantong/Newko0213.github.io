<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 56" width="340" height="56">
  <defs>
    <linearGradient id="bldgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2c3e50"/>
      <stop offset="100%" stop-color="#1a252f"/>
    </linearGradient>
  </defs>

  <!-- === Left: Cityscape Icon — full 56px height === -->
  <g transform="translate(4, 0)">

    <!-- Shenzhen Ping An Finance Centre (left) -->
    <polygon points="10,55 16,55 17,12 14,1 11,12" fill="url(#bldgGrad)"/>
    <line x1="14" y1="1" x2="14" y2="0" stroke="#2c3e50" stroke-width="1.4"/>
    <line x1="10.5" y1="20" x2="16" y2="20" stroke="#fff" stroke-width="0.6" opacity="0.45"/>
    <line x1="11" y1="32" x2="15.5" y2="32" stroke="#fff" stroke-width="0.6" opacity="0.45"/>
    <line x1="11" y1="44" x2="15.5" y2="44" stroke="#fff" stroke-width="0.6" opacity="0.45"/>

    <!-- Canton Tower (广州塔 小蛮腰) — center, dominant -->
    <path d="M26,55 Q26,42 31,30 Q33.5,24 31,18 Q27,9 28,1"
          fill="none" stroke="url(#bldgGrad)" stroke-width="3.2"/>
    <path d="M46,55 Q46,42 41,30 Q38.5,24 41,18 Q45,9 44,1"
          fill="none" stroke="url(#bldgGrad)" stroke-width="3.2"/>
    <line x1="36" y1="1" x2="36" y2="0" stroke="#2c3e50" stroke-width="1.6"/>
    <!-- Structural rings -->
    <line x1="28.5" y1="8" x2="43.5" y2="8" stroke="#2c3e50" stroke-width="0.8" opacity="0.5"/>
    <line x1="29.5" y1="14" x2="42.5" y2="14" stroke="#2c3e50" stroke-width="0.8" opacity="0.5"/>
    <line x1="31.5" y1="21" x2="40.5" y2="21" stroke="#2c3e50" stroke-width="0.8" opacity="0.5"/>
    <line x1="32.5" y1="27" x2="39.5" y2="27" stroke="#2c3e50" stroke-width="0.8" opacity="0.5"/>
    <line x1="31" y1="36" x2="41" y2="36" stroke="#2c3e50" stroke-width="0.8" opacity="0.5"/>
    <line x1="29" y1="44" x2="43" y2="44" stroke="#2c3e50" stroke-width="0.8" opacity="0.5"/>
    <!-- Observation deck -->
    <rect x="32" y="28" width="8" height="2" rx="0.6" fill="#2c3e50" opacity="0.3"/>

    <!-- KK100 (right) -->
    <polygon points="55,55 61,55 61.5,14 58.5,4 55.5,14" fill="url(#bldgGrad)"/>
    <polygon points="56,11 61,11 58.5,4" fill="url(#bldgGrad)" opacity="0.6"/>
    <line x1="55.5" y1="26" x2="61" y2="26" stroke="#fff" stroke-width="0.6" opacity="0.45"/>
    <line x1="55.5" y1="40" x2="61" y2="40" stroke="#fff" stroke-width="0.6" opacity="0.45"/>

    <!-- Ground line -->
    <line x1="4" y1="55" x2="67" y2="55" stroke="#2c3e50" stroke-width="0.8" opacity="0.2"/>
  </g>

  <!-- === Divider === -->
  <line x1="82" y1="10" x2="82" y2="46" stroke="#c0c0c0" stroke-width="0.8"/>

  <!-- === Right: Text — vertically centered, larger === -->
  <g transform="translate(96, 0)">
    <text x="0" y="24"
          font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
          font-size="22"
          font-weight="700"
          letter-spacing="0.5"
          fill="#1d1d1f">Tang Zhantong</text>

    <text x="0" y="44"
          font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
          font-size="13"
          font-weight="400"
          letter-spacing="2.5"
          fill="#6e6e73">GUANGZHOU LABORATORY</text>
  </g>
</svg>
