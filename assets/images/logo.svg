<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 80" width="420" height="80">
  <defs>
    <!-- Subtle gradient for the buildings -->
    <linearGradient id="bldgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2c3e50"/>
      <stop offset="100%" stop-color="#1a252f"/>
    </linearGradient>
  </defs>

  <!-- === Left: Cityscape Icon (Canton Tower + Shenzhen landmarks) === -->
  <g transform="translate(8, 4)">

    <!-- Shenzhen Ping An Finance Centre (tall tapering tower, left) -->
    <polygon points="18,72 22,72 23,18 21.5,8 20,10 17,18" fill="url(#bldgGrad)"/>
    <!-- Antenna spire -->
    <line x1="20.5" y1="8" x2="20.5" y2="2" stroke="#2c3e50" stroke-width="1"/>
    <!-- Horizontal bands -->
    <line x1="17.5" y1="30" x2="22.5" y2="30" stroke="#fff" stroke-width="0.4" opacity="0.5"/>
    <line x1="17.8" y1="45" x2="22.3" y2="45" stroke="#fff" stroke-width="0.4" opacity="0.5"/>
    <line x1="18" y1="58" x2="22" y2="58" stroke="#fff" stroke-width="0.4" opacity="0.5"/>

    <!-- Canton Tower (广州塔) — the iconic "小蛮腰" hyperbolic waist shape, center -->
    <!-- Left edge curve -->
    <path d="M36,72 Q36,55 40,42 Q42,36 40,28 Q37,18 38,8"
          fill="none" stroke="url(#bldgGrad)" stroke-width="2.2"/>
    <!-- Right edge curve -->
    <path d="M52,72 Q52,55 48,42 Q46,36 48,28 Q51,18 50,8"
          fill="none" stroke="url(#bldgGrad)" stroke-width="2.2"/>
    <!-- Antenna/spire on top -->
    <line x1="44" y1="8" x2="44" y2="0" stroke="#2c3e50" stroke-width="1.2"/>
    <!-- Horizontal structural rings -->
    <line x1="37" y1="16" x2="51" y2="16" stroke="#2c3e50" stroke-width="0.6" opacity="0.6"/>
    <line x1="39" y1="24" x2="49" y2="24" stroke="#2c3e50" stroke-width="0.6" opacity="0.6"/>
    <line x1="41" y1="32" x2="47" y2="32" stroke="#2c3e50" stroke-width="0.6" opacity="0.6"/>
    <!-- Waist — the narrowest point -->
    <line x1="41.5" y1="38" x2="46.5" y2="38" stroke="#2c3e50" stroke-width="0.6" opacity="0.6"/>
    <line x1="40" y1="48" x2="48" y2="48" stroke="#2c3e50" stroke-width="0.6" opacity="0.6"/>
    <line x1="38" y1="56" x2="50" y2="56" stroke="#2c3e50" stroke-width="0.6" opacity="0.6"/>
    <line x1="37" y1="64" x2="51" y2="64" stroke="#2c3e50" stroke-width="0.6" opacity="0.6"/>
    <!-- Observation deck platform -->
    <rect x="39" y="40" width="10" height="1.5" rx="0.5" fill="#2c3e50" opacity="0.4"/>

    <!-- KK100 / Shenzhen tower (right side, shorter angular tower) -->
    <polygon points="62,72 66,72 66.5,22 64,14 61.5,22" fill="url(#bldgGrad)"/>
    <!-- Crown detail -->
    <polygon points="62.5,18 65.5,18 64,14" fill="url(#bldgGrad)" opacity="0.7"/>
    <!-- Horizontal bands -->
    <line x1="62.2" y1="35" x2="65.8" y2="35" stroke="#fff" stroke-width="0.4" opacity="0.5"/>
    <line x1="62.2" y1="50" x2="65.8" y2="50" stroke="#fff" stroke-width="0.4" opacity="0.5"/>

    <!-- Ground line -->
    <line x1="10" y1="72" x2="74" y2="72" stroke="#2c3e50" stroke-width="0.8" opacity="0.3"/>
  </g>

  <!-- === Divider line === -->
  <line x1="96" y1="16" x2="96" y2="64" stroke="#c0c0c0" stroke-width="0.8"/>

  <!-- === Right: Text === -->
  <g transform="translate(112, 0)">
    <!-- Top line: Tang Zhantong -->
    <text x="0" y="34"
          font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
          font-size="22"
          font-weight="700"
          letter-spacing="0.5"
          fill="#1d1d1f">Tang Zhantong</text>

    <!-- Bottom line: Guangzhou Laboratory -->
    <text x="0" y="56"
          font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
          font-size="14"
          font-weight="400"
          letter-spacing="1.5"
          fill="#6e6e73">GUANGZHOU LABORATORY</text>
  </g>
</svg>
